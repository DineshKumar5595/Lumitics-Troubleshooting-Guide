<!DOCTYPE html>
<html>
<head>
  <title>Lumitics Troubleshooting Guide</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url('image_1.png'); 
      background-size: 45% auto; 
      background-position: 100% top; 
      background-repeat: no-repeat; 
      background-attachment: fixed; 
      display: flex;
      justify-content: flex-start; 
      padding-left: 50px; 
      padding-top: 50px;
      min-height: 100vh; 
      margin: 0;
    }

    /* THE MAIN CARD */
    .card {
      background: rgba(255, 255, 255, 0.95); 
      padding: 40px; 
      border-radius: 60px; /* Large rounded corners from your sketch */
      box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
      border: 3px solid #004085; 
      width: 550px; 
      text-align: center; 
      min-height: 600px; 
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* QUESTION BOX */
    #display-text {
      width: 90%;
      border: 2px solid #004085;
      border-radius: 20px;
      padding: 30px;
      margin-top: 20px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #333;
      text-align: center;
    }

    /* OVAL YES/NO BUTTONS */
    #yes-no-area {
      display: flex;
      justify-content: space-around;
      width: 100%;
      margin: 60px 0;
    }
    .oval-btn {
      background: white;
      color: #333;
      border: 2px solid #004085;
      padding: 20px 50px;
      border-radius: 100px; /* Creates the oval shape */
      font-size: 18px;
      cursor: pointer;
      min-width: 140px;
      transition: all 0.2s;
    }
    .oval-btn:hover {
      background: #f0f7ff;
      transform: scale(1.05);
    }

    /* ARROW BACK BUTTON */
    .arrow-back {
      position: relative;
      background: white;
      color: #333;
      border: 2px solid #004085;
      padding: 10px 20px 10px 40px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 40px;
      clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 25% 100%, 0% 50%); /* Creates arrow shape */
    }
    .arrow-back:hover { background: #eee; }

    /* HOME ICON BOX */
    .home-container {
      border: 2px solid #004085;
      border-radius: 20px;
      padding: 10px;
      cursor: pointer;
      width: 80px;
    }
    .home-container:hover { background: #eee; }
    .home-icon {
      font-size: 40px;
      display: block;
    }
    .home-text {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 5px;
      display: block;
    }

    /* MENU STYLING */
    .instruction-text { text-align: left; width: 90%; font-size: 15px; color: #333; font-weight: bold; margin-bottom: 10px;}
    #searchBar { width: 95%; padding: 15px; font-size: 16px; margin-bottom: 20px; border: 2px solid #004085; border-radius: 10px; }
    #issue-list { width: 100%; max-height: 350px; overflow-y: auto; }
    .menu-btn { display: block; width: 90%; margin: 10px auto; background-color: #2d2d2d; color: white; padding: 15px; border-radius: 10px; text-align: left; border: none; cursor: pointer;}
    .menu-btn:hover { background-color: #1a1a1a; }
  </style>
</head>
<body>

  <div class="card">
    <div id="menu-screen" style="width: 100%;">
      <h2 style="color:#004085">Lumitics Troubleshooting Guide</h2> 
      <p class="instruction-text">Type the issue you faced:</p> 
      <input type="text" id="searchBar" onkeyup="filterIssues()" placeholder="Search symptoms..."> 
      <div id="issue-list">
        <button class="menu-btn" onclick="startDiagnostic('rfid_start')">💳 RFID Card Not Detected</button> 
        <button class="menu-btn" onclick="startDiagnostic('data_start')">📡 Not Receiving Data</button> 
        <button class="menu-btn" onclick="startDiagnostic('power_start')">🔌 Device Not Turning On</button> 
        <button class="menu-btn" onclick="startDiagnostic('led_start')">🔴 LED Blinking Red</button> 
      </div>
    </div>

    <div id="diagnostic-screen" style="display: none; flex-direction: column; align-items: center; width: 100%;"> 
      
      <div id="display-text">Loading...</div> 
      
      <div id="yes-no-area">
        <button class="oval-btn" id="yes-btn" onclick="makeChoice('Yes')">Yes</button> 
        <button class="oval-btn" id="no-btn" onclick="makeChoice('No')">No</button> 
      </div>

      <button id="back-btn" class="arrow-back" onclick="goBack()">Back to Previous Step</button>

      <div class="home-container" onclick="goToMenu()">
        <span class="home-text">Home</span>
        <span class="home-icon">🏠</span>
      </div>
    </div>
  </div>

  <script>
    // Logic Database (carrying over from our previous work)
    const logicTree = {
      "rfid_start": { type: "question", text: "Is the device flashing green now?", yesNext: "rf_tap_diff", noNext: "rf_check_light" },
      "rf_check_light": { type: "question", text: "Is there any light on the device at all?", yesNext: "tech_support_res", noNext: "power_start" },
      "rf_tap_diff": { type: "question", text: "Please tap a different card on the reader.<br><br>Did the device detect the other card?", yesNext: "rf_led_flash", noNext: "rf_flashing_green" },
      "rf_flashing_green": { type: "question", text: "Does the device continue to flash green?", yesNext: "tech_support_res", noNext: "power_start" },
      "rf_led_flash": { type: "question", text: "Did the LED flash green and red when you tapped the card?", yesNext: "rf_new_card", noNext: "rf_led_condition" },
      "rf_led_condition": { type: "question", text: "Is the LED <b>Solid Green</b>?", yesNext: "rf_solid_green_check", noNext: "rf_is_blinking_red" },
      "rf_is_blinking_red": { type: "question", text: "Is the LED <b>Blinking Red</b>?", yesNext: "led_start", noNext: "power_start" },
      "rf_solid_green_check": { type: "question", text: "Did the LED change to solid green immediately?", yesNext: "rf_check_operation_type", noNext: "rf_tap_other" },
      "rf_tap_other": { type: "question", text: "Did you tap another card?", yesNext: "rf_restart_action", noNext: "tech_support_res" },
      "rf_new_card": { type: "question", text: "Did you try tapping a new card?", yesNext: "rf_service_type", noNext: "rf_used_before" },
      "rf_used_before": { type: "question", text: "Have you used this card before?", yesNext: "rf_check_operation_type", noNext: "rf_service_type" },
      "rf_service_type": { type: "question", text: "Are you starting a <b>new service</b>?", yesNext: "rf_informed_cs", noNext: "rf_get_id_card" },
      "rf_informed_cs": { type: "question", text: "Have you informed CS about starting the new service?", yesNext: "rf_get_id_card", noNext: "rf_service_details" },
      "rf_service_details": { type: "resolution", text: "Please provide the Service Name and Operation Time. Technical support will contact you shortly." },
      "rf_get_id_card": { type: "question", text: "Please provide Device ID and card number. CS: Update number and wait 5 mins. Is card working?", yesNext: "rf_notify_res", noNext: "rf_led_status_after" },
      "rf_notify_res": { type: "resolution", text: "Success! Inform the client they can start using the card." },
      "rf_led_status_after": { type: "question", text: "Is the LED flashing green and red now?", yesNext: "rf_time_tied", noNext: "rf_only_flashing_green" },
      "rf_only_flashing_green": { type: "question", text: "Is it just flashing green?", yesNext: "rf_restart_action", noNext: "tech_support_res" },
      "rf_time_tied": { type: "question", text: "Is this card tied to a time-based operation?", yesNext: "rf_time_res", noNext: "rf_restart_action" },
      "rf_time_res": { type: "resolution", text: "Notice: Client can only use the card within the allocated time window." },
      "rf_restart_action": { type: "question", text: "Please restart the device. Able to tap now?", yesNext: "rf_ready_res", noNext: "rf_diff_card_test" },
      "rf_diff_card_test": { type: "question", text: "Try a different card. Does it work?", yesNext: "rf_ready_res", noNext: "rf_card_num_check" },
      "rf_card_num_check": { type: "question", text: "Is the card number correct?", yesNext: "rf_escalate_hw", noNext: "rf_get_id_card" },
      "rf_check_operation_type": { type: "question", text: "Operation type: Is it <b>RFID only</b>?", yesNext: "rf_hw_config_check", noNext: "rf_is_time_based" },
      "rf_is_time_based": { type: "question", text: "Is it <b>Time-based</b>?", yesNext: "rf_no_tap_needed", noNext: "rf_is_card_time" },
      "rf_is_card_time": { type: "question", text: "Is it <b>Card-Time based</b>?", yesNext: "rf_window_notice", noNext: "rf_no_card_type" },
      "rf_window_notice": { type: "question", text: "Device operates in a window. Change the time?", yesNext: "rf_cs_time_get", noNext: "rf_time_use_res" },
      "rf_no_card_type": { type: "question", text: "Is it <b>No card</b> type? LED solid green when starting?", yesNext: "rf_no_tap_needed", noNext: "tech_support_res" },
      "rf_hw_config_check": { type: "question", text: "HW check: Is card configured?", yesNext: "rf_restart_action", noNext: "rf_not_in_system" },
      "rf_not_in_system": { type: "resolution", text: "Card not in system. Provide ID and number to CS." },
      "rf_cs_time_get": { type: "resolution", text: "CS: Get desired time and inform hardware team." },
      "rf_time_use_res": { type: "resolution", text: "Use device based on the allocated time schedule." },
      "rf_no_tap_needed": { type: "resolution", text: "No card needed. Machine triggers automatically." },
      "rf_ready_res": { type: "resolution", text: "Success! Device is ready." },
      "rf_escalate_hw": { type: "resolution", text: "Escalating to hardware team. Provide contact details." },
      "led_start": { type: "question", text: "Is the weight bucket attached?", yesNext: "l_food_check", noNext: "l_attach_res" },
      "l_food_check": { type: "question", text: "Is there food in the bucket?", yesNext: "l_clear_res", noNext: "l_sticker_check" },
      "l_sticker_check": { type: "question", text: "Is blue sticker good?", yesNext: "power_start", noNext: "tech_support_res" },
      "l_attach_res": { type: "resolution", text: "Attach bucket and restart." },
      "l_clear_res": { type: "resolution", text: "Clear food waste and restart." },
      "power_start": { type: "question", text: "Is the charger plugged in?", yesNext: "p_charger_red", noNext: "p_plug_it" },
      "p_charger_red": { type: "question", text: "Is the charger head light RED?", yesNext: "p_id_check", noNext: "tech_support_res" },
      "p_plug_it": { type: "question", text: "Plug charger in. Is light RED?", yesNext: "p_id_check", noNext: "tech_support_res" },
      "p_id_check": { type: "question", text: "Is ID V0501?", yesNext: "p_battery_check", noNext: "p_battery_check" },
      "p_battery_check": { type: "question", text: "Battery % showing?", yesNext: "p_boot_wait", noNext: "tech_support_res" },
      "p_boot_wait": { type: "question", text: "Wait 1 min. LED Flashing Green?", yesNext: "d_resolved", noNext: "led_start" },
      "data_start": { type: "question", text: "Last data received?", yesText: "Yesterday", yesNext: "d_used_today", noText: "1 Week Ago", noNext: "d_why_week" },
      "d_used_today": { type: "question", text: "Did client use device today?", yesNext: "d_wait_hour", noNext: "d_last_used" },
      "d_last_used": { type: "question", text: "When last used?", yesText: "Yesterday", yesNext: "d_wait_hour", noText: "1 Week Ago", noNext: "d_why_week" },
      "d_wait_hour": { type: "question", text: "Leave on for 1 hour. Data received?", yesNext: "d_slow_net", noNext: "tech_support_res" },
      "d_slow_net": { type: "resolution", text: "Slow network. Leave on 30 mins after service." },
      "d_why_week": { type: "question", text: "Why no use for a week?", yesText: "Power issue", yesNext: "power_start", noText: "Kitchen closed", noNext: "tech_support_res" },
      "d_resolved": { type: "resolution", text: "Issue Resolved!" },
      "tech_support_res": { type: "resolution", text: "Resolution: <br><br> Please provide contact information. Technical team will reach out shortly." }
    };

    let currentNode = ""; 
    let history = []; 

    function startDiagnostic(startNodeId) {
      document.getElementById("menu-screen").style.display = "none"; 
      document.getElementById("diagnostic-screen").style.display = "flex"; 
      currentNode = startNodeId; 
      history = []; 
      updateScreen(); 
    }

    function goToMenu() {
      document.getElementById("menu-screen").style.display = "block"; 
      document.getElementById("diagnostic-screen").style.display = "none"; 
      document.getElementById("searchBar").value = ""; 
      filterIssues(); 
    }

    function updateScreen() {
      let node = logicTree[currentNode]; 
      let textBox = document.getElementById("display-text"); 
      let yesNoArea = document.getElementById("yes-no-area"); 
      let backBtn = document.getElementById("back-btn");
      let yesBtn = document.getElementById("yes-btn");
      let noBtn = document.getElementById("no-btn");

      textBox.innerHTML = node.text; 
      yesBtn.innerText = node.yesText || "Yes";
      noBtn.innerText = node.noText || "No";

      backBtn.style.visibility = (history.length > 0) ? "visible" : "hidden";

      if (node.type === "resolution") {
        textBox.style.borderColor = "#28a745"; /* Green border for resolution */
        textBox.style.color = "#28a745";
        yesNoArea.style.display = "none";      
      } else {
        textBox.style.borderColor = "#004085";
        textBox.style.color = "#333";
        yesNoArea.style.display = "block";     
      }
    }

    function makeChoice(answer) {
      history.push(currentNode); 
      if (answer === 'Yes') {
        currentNode = logicTree[currentNode].yesNext; 
      } else {
        currentNode = logicTree[currentNode].noNext; 
      }
      updateScreen(); 
    }

    function goBack() {
      if (history.length > 0) {
        currentNode = history.pop(); 
        updateScreen();
      }
    }

    function filterIssues() {
      let input = document.getElementById('searchBar').value.toLowerCase(); 
      let buttons = document.getElementById('issue-list').getElementsByTagName('button'); 
      for (let i = 0; i < buttons.length; i++) {
        let btnText = buttons[i].innerText.toLowerCase(); 
        buttons[i].style.display = btnText.includes(input) ? "block" : "none";
      }
    }
  </script>
</body>

</html>
